<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Wall 3x3</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1e1e1e;
            --accent-color: #ff0000;
            --text-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 { margin: 20px 0; font-weight: 300; letter-spacing: 2px; }

        /* Сетка 3x3 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 10px;
            width: 95vw;
            height: 85vh;
            max-width: 1400px;
        }

        .video-slot {
            background-color: var(--card-bg);
            border: 2px dashed #333;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .video-slot:hover { border-color: var(--accent-color); }

        .add-btn {
            background: none;
            border: none;
            color: #555;
            font-size: 50px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .add-btn:hover { color: var(--accent-color); transform: scale(1.1); }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .remove-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            cursor: pointer;
            z-index: 10;
            display: none;
        }

        .video-slot:hover .remove-btn { display: block; }

        /* Адаптивность для мобилок */
        @media (max-width: 900px) {
            .grid-container {
                grid-template-columns: repeat(2, 1fr);
                height: auto;
            }
        }
    </style>
</head>
<body>

    <h1>YOUTUBE MULTI-VIEW 3x3</h1>

    <div class="grid-container" id="grid">
        </div>

    <script>
        const grid = document.getElementById('grid');
        const totalSlots = 9;

        // Загрузка сохраненных видео
        let savedVideos = JSON.parse(localStorage.getItem('yt-wall-videos')) || {};

        function initGrid() {
            grid.innerHTML = '';
            for (let i = 0; i < totalSlots; i++) {
                const slot = document.createElement('div');
                slot.className = 'video-slot';
                slot.dataset.index = i;

                if (savedVideos[i]) {
                    renderVideo(slot, savedVideos[i]);
                } else {
                    renderAddButton(slot);
                }

                grid.appendChild(slot);
            }
        }

        function renderAddButton(slot) {
            slot.innerHTML = `<button class="add-btn" onclick="addVideo(${slot.dataset.index})">+</button>`;
        }

        function renderVideo(slot, videoId) {
            slot.innerHTML = `
                <button class="remove-btn" onclick="removeVideo(${slot.dataset.index})">×</button>
                <iframe src="https://www.youtube.com/embed/${videoId}?autoplay=0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen></iframe>
            `;
        }

        window.addVideo = function(index) {
            const url = prompt("Введите ссылку на YouTube видео:");
            if (!url) return;

            const videoId = extractVideoID(url);
            if (videoId) {
                savedVideos[index] = videoId;
                localStorage.setItem('yt-wall-videos', JSON.stringify(savedVideos));
                initGrid();
            } else {
                alert("Неверная ссылка!");
            }
        };

        window.removeVideo = function(index) {
            delete savedVideos[index];
            localStorage.setItem('yt-wall-videos', JSON.stringify(savedVideos));
            initGrid();
        };

        function extractVideoID(url) {
            const regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[7].length == 11) ? match[7] : false;
        }

        initGrid();
    </script>
</body>
</html>
